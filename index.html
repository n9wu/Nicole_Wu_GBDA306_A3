<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flo Health - Login</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 20% 15%,
            rgba(255, 107, 139, 0.25),
            transparent 55%
          ),
          radial-gradient(
            circle at 80% 90%,
            rgba(255, 182, 193, 0.2),
            transparent 55%
          ),
          linear-gradient(180deg, #f5f2ff 0%, #f3f3f8 55%, #e0e0e0 100%);
        color: #2b2b2b;
      }
      .app {
        width: 393px;
        height: 852px;
        max-width: 100vw;
        max-height: 100vh;
        background: #ffffff;
        border-radius: 28px;
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.12),
          0 8px 18px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        padding: 36px 28px;
        position: relative;
        overflow: hidden;
      }
      .brand {
        text-align: center;
        margin-top: 8px;
        margin-bottom: 42px;
      }
      .logo-icon {
        font-size: 52px;
        margin-bottom: 10px;
      }
      .brand h1 {
        color: #ff6b8b;
        font-size: 30px;
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .brand p {
        color: #7a7a7a;
        font-size: 14px;
        margin: 8px 0 0;
      }
      .input-group {
        margin-bottom: 16px;
      }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(200, 200, 210, 0.75);
        border-radius: 14px;
        background: #fafafa;
        font-size: 15px;
        outline: none;
        transition:
          border 0.25s ease,
          box-shadow 0.25s ease,
          transform 0.25s ease;
      }
      .input-group input:focus {
        border-color: #ff6b8b;
        box-shadow: 0 0 0 4px rgba(255, 107, 139, 0.15);
        transform: translateY(-1px);
        background: #fff;
      }
      .btn-primary {
        display: block;
        width: 100%;
        text-align: center;
        background: linear-gradient(135deg, #ff6b8b, #ff8fc3);
        color: white;
        padding: 15px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        margin-top: 18px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(255, 107, 139, 0.25);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(255, 107, 139, 0.33);
      }
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 30px 0 18px;
        color: #ccc;
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid rgba(220, 220, 230, 0.8);
      }
      .divider:not(:empty)::before {
        margin-right: 0.25em;
      }
      .divider:not(:empty)::after {
        margin-left: 0.25em;
      }
      .btn-secondary {
        display: block;
        width: 100%;
        text-align: center;
        background: #ffffff;
        color: #555;
        border: 1px solid rgba(200, 200, 210, 0.9);
        padding: 14px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        transition: all 0.25s ease;
      }
      .btn-secondary:hover {
        border-color: rgba(255, 107, 139, 0.9);
        color: #ff6b8b;
        background: rgba(255, 238, 242, 0.9);
      }
      .privacy-note {
        text-align: center;
        font-size: 12px;
        color: #9a9a9a;
        margin-top: auto;
        line-height: 1.5;
      }
      .privacy-note a {
        color: #ff6b8b;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="brand">
        <div class="logo-icon">🌸</div>
        <h1>Flo Health</h1>
        <p>Your body, your rules.</p>
      </div>
      <form
        onsubmit="
          event.preventDefault();
          window.location.href = 'onboarding.html';
        "
      >
        <div class="input-group">
          <input type="email" placeholder="Email address" required />
        </div>
        <div class="input-group">
          <input type="password" placeholder="Password" required />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
      <div class="divider">OR</div>
      <a href="onboarding.html" class="btn-secondary">Explore Anonymously</a>
      <div class="privacy-note">
        By continuing, you agree to our <a href="#">Terms</a>.<br />
        If you explore anonymously, zero data leaves your device.
      </div>
    </div>
  </body>
</html>
